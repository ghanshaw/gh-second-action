name: test-project
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code babes
        uses: actions/checkout@v3
      - name: Install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: "Install dependencies honey"
        run: npm ci
      - name: Run some tests
        run: npm test
      
      

